name: ASVP Daily Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: write

concurrency:
  group: asvp-monitor-daily
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Rotate snapshots
        run: |
          mkdir -p docs/data

          if [ -f docs/data/current.json ]; then
            cp docs/data/current.json docs/data/previous.json
            echo "Copied docs/data/current.json -> docs/data/previous.json"
          else
            echo "No current.json yet"
          fi

      - name: Run ASVP scan
        run: |
          python scripts/scan_asvp.py

      - name: Build diff
        run: |
          python scripts/diff_snapshots.py

      - name: Commit data and dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/data/current.json
          git add docs/data/previous.json
          git add docs/data/changes.json
          git add docs/index.html
          git add docs/styles.css
          git add docs/app.js

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ASVP dashboard data"
            git push
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asvp-data
          path: |
            docs/data/current.json
            docs/data/previous.json
            docs/data/changes.json
            docs/index.html
            docs/styles.css
            docs/app.js
