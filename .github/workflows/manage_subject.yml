name: Manage ASVP Subject

on:
  workflow_dispatch:
    inputs:
      subject_id:
        description: "Subject ID"
        required: true

      action:
        description: "enable or disable"
        required: true
        default: "disable"

permissions:
  contents: write

jobs:
  manage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run subject manager
        run: |
          python scripts/manage_subject.py \
            "${{ github.event.inputs.subject_id }}" \
            "${{ github.event.inputs.action }}"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add config/watchlist.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Manage subject ${{ github.event.inputs.subject_id }}"
            git push
          fi
