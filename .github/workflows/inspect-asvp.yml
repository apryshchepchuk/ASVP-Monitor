name: Inspect ASVP ZIP

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run inspector
        run: |
          python scripts/inspect_asvp_zip.py

      - name: Upload sample artifact
        uses: actions/upload-artifact@v4
        with:
          name: asvp-sample
          path: samples/asvp_sample.json
