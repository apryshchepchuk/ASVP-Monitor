<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Моніторинг АСВП</title>
  <link rel="stylesheet" href="./styles.css?v=4" />
  <script src="./app.js?v=4"></script>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>Моніторинг АСВП</h1>
        <p class="subtitle">Виконавчі провадження по боржниках і стягувачах</p>
      </div>
      <div class="updated" id="updatedAt">Оновлення: —</div>
    </header>

    <section class="summary" id="summary"></section>

    <section class="controls">
      <input
        id="searchInput"
        class="search"
        type="search"
        placeholder="Пошук за назвою, кодом, ВП, статусом, органом ДВС..."
      />
    </section>

    <section id="statusBox" class="status-box hidden"></section>
    <section id="content" class="content"></section>
  </main>

  <script src="./app.js?v=3"></script>
</body>
</html>
