name: ASVP Daily Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: write

concurrency:
  group: asvp-monitor-daily
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Ensure data directories
        run: |
          mkdir -p docs/data
          mkdir -p docs/data/history

      - name: Rotate snapshots
        run: |
          if [ -f docs/data/current.json ]; then
            cp docs/data/current.json docs/data/previous.json
            echo "Copied docs/data/current.json -> docs/data/previous.json"
          else
            echo "No current.json yet"
          fi

      - name: Run ASVP scan
        run: |
          python scripts/scan_asvp.py

      - name: Build diff
        run: |
          python scripts/diff_snapshots.py

      - name: Build events
        run: |
          python scripts/build_events.py

      - name: Build dashboard data
        run: |
          python scripts/build_dashboard_data.py

      - name: Commit data and dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/data/current.json
          git add docs/data/changes.json
          git add docs/data/dashboard.json
          git add docs/data/history/events.json

          if [ -f docs/data/previous.json ]; then
            git add docs/data/previous.json
          fi

          git add docs/index.html
          git add docs/styles.css
          git add docs/app.js

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ASVP dashboard data"
            git push
          fi

      - name: Send email digest
        env:
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED }}
          EMAIL_FORCE: "false"
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/send_email_digest.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asvp-data
          path: |
            docs/data/current.json
            docs/data/changes.json
            docs/data/dashboard.json
            docs/data/history/events.json
            docs/index.html
            docs/styles.css
            docs/app.js
